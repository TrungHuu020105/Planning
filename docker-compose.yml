services:
  backend:
    build:
      context: ./backend
    container_name: planner-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: planner-frontend
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=
      - PROXY_TARGET=http://backend:8000
    ports:
      - "2005:5173"
